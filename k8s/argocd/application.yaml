apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: go-simple-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/akulovnv/wit2-devops-project
    targetRevision: main
    path: k8s/helm/go-simple-api
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: wit2-devops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

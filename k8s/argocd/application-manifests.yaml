apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: go-simple-api-manifests
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/akulovnv/wit2-devops-project
    targetRevision: main
    path: k8s/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: wit2-devops
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - SyncStrategy=Apply

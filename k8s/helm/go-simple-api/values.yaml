replicaCount: 2

image:
  repository: ghcr.io/akulovnv/wit2-devops-project
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-credentials

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  host: wit2.local
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

env:
  PORT: "8080"
  LOG_LEVEL: "info"

containerPort: 8080

probes:
  liveness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    path: /health
    initialDelaySeconds: 3
    periodSeconds: 5

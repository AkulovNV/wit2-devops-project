apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: go-simple-api
  namespace: wit2-devops
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: wit2.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: go-simple-api
                port:
                  number: 80
